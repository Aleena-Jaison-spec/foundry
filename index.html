<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Indoor Navigator Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>Navigation</h2>
            <label>Start Location:</label>
            <select id="startSelect"></select>
            
            <label>Destination:</label>
            <select id="endSelect"></select>
            
            <button id="findPathBtn">Get Directions</button>
            <hr>
            <div id="directionsList">
                <p class="placeholder">Directions will appear here...</p>
            </div>
        </div>
        
        <div class="map-area">
            <canvas id="mapCanvas"></canvas>
            <div id="roomPopup" class="hidden"></div>
        </div>
    </div>

    <script src="mapData.js"></script>
    <script src="script.js"></script>
    
</body>
</html>
